name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - lectures/**
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Git checkout (merge)
        uses: actions/checkout@v5
        if: github.event_name != 'pull_request'
        with:
          fetch-depth: 0

      - name: Git checkout (PR)
        uses: actions/checkout@v5
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Build and run tests
        run: sbt clean compile test

  quality:
    name: Coverage and SonarQube
    runs-on: ubuntu-latest
    needs: build
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io

    steps:
      - name: Git checkout (merge)
        uses: actions/checkout@v5
        if: github.event_name != 'pull_request'
        with:
          fetch-depth: 0

      - name: Git checkout (PR)
        uses: actions/checkout@v5
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run coverage
        run: sbt clean coverage test coverageAggregate

      - name: Convert JUnit XML reports to Sonar generic test execution
        run: python3 .sonar/convert_junit_to_sonar.py

      - name: Upload coverage report to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_FLAG_NAME: scala-3.5
        run: sbt coveralls

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scoverage-reports
          path: |
            target/scala-3.5.0/scoverage-report
            core/target/scala-3.5.0/scoverage-report
            app/target/scala-3.5.0/scoverage-report
            data/target/scala-3.5.0/scoverage-report
            realtime/target/scala-3.5.0/scoverage-report
            .sonar/test-exec.xml
          if-no-files-found: warn

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
