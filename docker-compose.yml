version: '3.8'

services:
  # Database Services
  mongodb:
    image: mongo:7.0
    container_name: chess-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=chess
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/chess --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chess-network

  postgres:
    image: postgres:16
    container_name: chess-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=chess
      - POSTGRES_USER=chess
      - POSTGRES_PASSWORD=chess123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chess-network

  # Microservices
  game-service:
    build:
      context: .
      dockerfile: Dockerfile.game-service
    container_name: chess-game-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      # Database configuration - switch between mongodb and postgres
      - CHESS_DB=mongodb
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DATABASE=chess
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=chess
      - POSTGRES_USER=chess
      - POSTGRES_PASSWORD=chess123
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chess-network

  ui-service:
    build:
      context: .
      dockerfile: Dockerfile.ui-service
    container_name: chess-ui-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chess-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: chess-api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GAME_SERVICE_URL=http://game-service:8081
      - UI_SERVICE_URL=http://ui-service:8082
    depends_on:
      game-service:
        condition: service_healthy
      ui-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chess-network

networks:
  chess-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  postgres-data:
    driver: local
