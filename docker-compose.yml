version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: chess-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: chess
      MONGO_INITDB_ROOT_PASSWORD: chess123
      MONGO_INITDB_DATABASE: chess
    volumes:
      - mongodb_data:/data/db
    networks:
      - chess-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/chess --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: chess-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess123
      POSTGRES_DB: chess
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chess-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  chess-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  postgres_data:
    driver: local
