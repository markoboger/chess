version: '3.8'

services:
  game-service:
    build:
      context: .
      dockerfile: Dockerfile.game-service
    container_name: chess-game-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chess-network

  ui-service:
    build:
      context: .
      dockerfile: Dockerfile.ui-service
    container_name: chess-ui-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chess-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: chess-api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GAME_SERVICE_URL=http://game-service:8081
      - UI_SERVICE_URL=http://ui-service:8082
    depends_on:
      game-service:
        condition: service_healthy
      ui-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chess-network

networks:
  chess-network:
    driver: bridge
