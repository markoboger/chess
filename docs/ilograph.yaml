perspectives:
  - name: Dependencies
    relations:
      - from: Player
        to: WebUI
        label: plays in browser

      - from: Player
        to: GUI
        label: plays locally

      - from: Player
        to: TUI
        label: plays locally

      - from: WebUI
        to: api-gateway
        label: HTTP JSON via axios

      - from: api-gateway
        to: game-service
        label: HTTP proxy to game endpoints and openings

      - from: game-service
        to: postgres
        label: persistence via JDBC Doobie

      - from: game-service
        to: mongodb
        label: persistence via Mongo driver

      - from: match-runner-service
        to: game-service
        label: HTTP JSON create games and poll state

      - from: match-runner-service
        to: postgres
        label: persistence via JDBC Doobie

      - from: WebUI
        to: match-runner-service
        label: HTTP JSON browse experiments

      - from: WebUI
        to: Realtime Service
        label: WebSocket subscribe per gameId

      - from: game-service
        to: Realtime Service
        label: HTTP publish events
