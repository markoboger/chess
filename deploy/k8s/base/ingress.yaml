# Routes external HTTP to the Vue UI. Nginx in vue-ui proxies /api/ to api-gateway.
# k3d / k3s: Traefik is usually the default Ingress controller.
#
# For the university host, set `spec.rules[0].host` to your DNS name or e.g. 141.37.74.153.nip.io
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chess
  namespace: chess
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vue-ui
                port:
                  number: 80
