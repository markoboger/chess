apiVersion: apps/v1
kind: Deployment
metadata:
  name: match-runner
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: match-runner
  template:
    metadata:
      labels:
        app: match-runner
    spec:
      containers:
        - name: match-runner
          image: chess-match-runner:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: PORT
              value: "8084"
            - name: CHESS_API_URL
              value: "http://game-service:8081"
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: chess-db-secrets
                  key: postgres-database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: chess-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chess-db-secrets
                  key: postgres-password
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: match-runner
  namespace: chess
spec:
  selector:
    app: match-runner
  ports:
    - port: 8084
      targetPort: 8084
