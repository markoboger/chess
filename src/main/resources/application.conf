# Database Configuration for Chess Microservices
#
# This configuration supports both MongoDB and PostgreSQL backends.
# Select the active database by setting the CHESS_DB environment variable:
#   CHESS_DB=mongodb  - Use MongoDB (default)
#   CHESS_DB=postgres - Use PostgreSQL

database {
  # Active database: mongodb or postgres
  active = "mongodb"
  active = ${?CHESS_DB}

  mongodb {
    uri = "mongodb://localhost:27017"
    uri = ${?MONGO_URI}
    database = "chess"
    database = ${?MONGO_DATABASE}
  }

  postgres {
    host = "localhost"
    host = ${?POSTGRES_HOST}
    port = 5432
    port = ${?POSTGRES_PORT}
    database = "chess"
    database = ${?POSTGRES_DATABASE}
    user = "chess"
    user = ${?POSTGRES_USER}
    password = "chess123"
    password = ${?POSTGRES_PASSWORD}
    pool-size = 10
  }
}

# Microservices Configuration
services {
  game {
    port = 8081
    port = ${?GAME_SERVICE_PORT}
  }

  gateway {
    port = 8080
    port = ${?GATEWAY_PORT}
    game-service-url = "http://localhost:8081"
    game-service-url = ${?GAME_SERVICE_URL}
  }

  ui {
    port = 8082
    port = ${?UI_SERVICE_PORT}
  }
}
